<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Sports Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
    body { -webkit-text-size-adjust: 100%; font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif; }
    @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.15;transform:scale(0.6);} }
    @keyframes spin      { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    @keyframes alertPulse{ from{opacity:0.7;} to{opacity:1;} }
    .live-dot  { animation: livePulse 1.1s ease-in-out infinite; }
    .spin      { animation: spin 0.8s linear infinite; }
    .alert-bar { animation: alertPulse 0.6s ease-in-out infinite alternate; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Plain JS, no Babel needed -->
  <script src="/app.js"></script>
</body>
</html>
